# Render blueprint — free-tier deploy.
# Provisions the web service + a Redis (Key Value) instance + a warm cron.
# Only DATABASE_URL is external (a free Neon/Supabase Postgres); paste it in the
# dashboard after launching the blueprint. A persistent web service (not
# serverless) suits Watchly's long scrapes + background cache revalidation.
services:
  - type: web
    name: watchly
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: DATABASE_URL # the ONLY value to paste — your Neon/Supabase Postgres URL
        sync: false
      - key: REDIS_URL # auto-wired from the Key Value instance below
        fromService:
          type: keyvalue
          name: watchly-redis
          property: connectionString
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: CONSUMET_PROVIDERS
        value: AnimeUnity,AnimeSaturn
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      # Site URL + auth baseURL auto-detect Render's RENDER_EXTERNAL_URL, so no
      # manual URL config is needed. Override with NEXT_PUBLIC_SITE_URL if desired.
      # Optional: SENTRY_DSN / NEXT_PUBLIC_SENTRY_DSN to enable error monitoring.

  # Managed Redis (Key Value) — free tier, LRU eviction for a pure cache.
  # ipAllowList: [] keeps it private (reachable only from Render services).
  - type: keyvalue
    name: watchly-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  # Cache warmer — keeps the top titles hot so first clicks are instant.
  # WARM_HOST auto-resolves to the web service's hostname, so no manual URL.
  - type: cron
    name: watchly-warm
    runtime: image
    plan: free
    schedule: "*/20 * * * *"
    image:
      url: curlimages/curl:latest
    dockerCommand: sh -c "curl -fsS \"https://$WARM_HOST/api/warm?limit=12\" || true"
    envVars:
      - key: WARM_HOST
        fromService:
          type: web
          name: watchly
          property: host
