<script type="text/javascript">
      document.addEventListener('DOMContentLoaded', () => {
          const source = 'https://crunchy.animeflix.live/https://tc-014.azipcdn.com/1ab5d45273a9183bebb58eb74d5722d8ea6384f350caf008f08cf018f1f0566d0cb82a2a799830d1af97cd3f4b6a9a81ef3aed2fb783292b1abcf1b8560a1d1aa308008b88420298522a9f761e5aa1024fbe74e5aa853cfc933cd1219327d1232e91847a185021b184c027f97ae732b3708ee6beb80ba5db6628ced43f1196fe/f5bc111e65c74a37fe6fc136766c7b24/ep.3.1677608506.m3u8';
          const video = document.querySelector('video');
          var starttime = Number('132');
          var endtime = Number('222');
          var thumbnailfile = JSON.parse('[]')?.find(elem => elem.kind === "thumbnails")?.file;

          const defaultOptions = {
            captions: { active: true, language: 'en'},
            previewThumbnails: thumbnailfile && thumbnailfile.length > 0 ? { enabled: true, src: thumbnailfile } : {enabled: false},
            fullscreen: { enabled: true, fallback: true, iosNative: true, container: "#videoplayer" },
            controls: ['play-large', 'rewind', 'play', 'fast-forward', 'progress', 'mute', 'volume', 'current-time', 'duration', 'settings', 'fullscreen'],
            markers: starttime ? { enabled: true, points: [{ time: Math.round(starttime), label: "Intro Start" }, { time: Math.round(endtime), label: "Intro End" }]} : {enabled: false},
            clickToPlay: navigator.userAgentData?.mobile ? false : true
          };

          if (!Hls.isSupported() || 'true' === "false") {
            video.src = source;
            var player = new Plyr(video, defaultOptions);
          } else {
            // For more Hls.js options, see https://github.com/dailymotion/hls.js
            const hls = new Hls({
              xhrSetup: 'gogoanime' === "crunchy" ? function (xhr, url) {
                // proxy these cors requests
                url = `https://crunchy.animeflix.live/${url.replace(/amp;/g, "")}`
                xhr.open('GET', url, true)
              } : null
            });
            hls.loadSource(source);

            // From the m3u8 playlist, hls parses the manifest and returns
            // all available video qualities. This is important, in this approach,
            // we will have one source on the Plyr player.
            hls.on(Hls.Events.MANIFEST_PARSED, function (event, data) {

              // Transform available levels into an array of integers (height values).
              if (hls.levels.length > 1) {
                const availableQualities = hls.levels.map((l) => l.height);
                availableQualities.unshift(0) //prepend 0 to quality array

                // Add new qualities to option
                defaultOptions.quality = {
                  default: 0, //Default - AUTO
                  options: availableQualities,
                  forced: true,
                  onChange: (e) => updateQuality(e),
                }
                // Add Auto Label 
                defaultOptions.i18n = {
                  qualityLabel: {
                    0: 'Auto',
                  },
                }

                hls.on(Hls.Events.LEVEL_SWITCHED, function (event, data) {
                  var span = document.querySelector(".plyr__menu__container [data-plyr='quality'][value='0'] span")
                  if (hls.autoLevelEnabled) {
                    span.innerHTML = `AUTO (${hls.levels[data.level].height}p)`
                  } else {
                    span.innerHTML = `AUTO`
                  }
                })
              }

              // Initialize new Plyr player with quality options
              var player = new Plyr(video, defaultOptions);
            });

            hls.on(Hls.Events.ERROR, function (event, data) {
              /*if (data.fatal && data.type === "networkError") {
                if('gogoanime' === "crunchy") parent.postMessage('settings-2', '*');
                else if('gogoanime' === "gogoanime") parent.postMessage('settings-3', '*');
                else if('gogoanime' === "zoro") parent.postMessage('settings-4', '*');
                else if('gogoanime' === "allanime") parent.postMessage("backbutton-clicked", "*");
              }*/
            });

            hls.attachMedia(video);
            window.hls = hls;
          }

          function updateQuality(newQuality) {
            if (newQuality === 0) {
              window.hls.currentLevel = -1; //Enable AUTO quality if option.value = 0
            } else {
              window.hls.levels.forEach((level, levelIndex) => {
                if (level.height === newQuality) {
                  window.hls.currentLevel = levelIndex;
                }
              });
            }
          }
      });

<script type="text/javascript">
      var plyrplayer = document.getElementById("player");
      var interval;
      plyrplayer.addEventListener('ready', (event) => {
        var player = event.detail.plyr;
        player.play().then(() => {
          if(!isNaN('5')) player.currentTime = Number("5");
          parent.postMessage('start-playing', '*');
        }).catch(e => parent.postMessage('start-playing', '*'));

        if('gogoanime' === "crunchy") {
          var options = {
            video: plyrplayer,
            subUrl: JSON.parse('[]').find(sub => sub.lang.startsWith(player?.captions?.language || "en"))?.url,
            fonts: ['/public/Lato-Bold.ttf'],
            workerUrl: '/public/subtitle-worker.js'
          };
          var instance = new SubtitlesOctopus(options);
          player.on('languagechange', (event) => {
            var plyr = event.detail.plyr;
            instance.setTrackByUrl(JSON.parse(`[]`).find(sub => sub.lang.startsWith(plyr.captions.language))?.url);
          });
        }
        

        var starttime = Number('132');
        var endtime = Number('222');
        //if((endtime-starttime < 10 || endtime-starttime > 180) && starttime > 1 && JSON.parse('false') === false) reportStamp(true);
        if(!isNaN(starttime) && starttime !== endtime && JSON.parse('false') === false) {
          interval = setInterval(() => {
            var skipbutton = document.getElementById("skipbutton");
            var skiptime = player.currentTime < starttime+10;
            if(player.currentTime > starttime && skiptime) {
              skipbutton.style.zIndex = 2147483647;
              skipbutton.style.opacity = 1;
            } else if(!skiptime) {
              clearInterval(interval);
              skipbutton.style.display = "none";
            }
          }, 3000);
        } else if(JSON.parse('false') === true && !navigator.userAgentData?.mobile) {
          var notice = setInterval(() => {
            if(player.currentTime > 30) {
              parent.postMessage('timestamp-notice', '*');
              clearInterval(notice);
            }
          }, 5000)
        }

        setInterval(() => {
          if(player.playing) parent.postMessage({type: "watchprogress", position: player.currentTime, duration: player.duration}, "*");
        }, 20000);

        player.on('controlshidden', () => {
          document.getElementById("backbutton").style.opacity=0;
        });
        player.on('controlsshown', () => {
          document.getElementById("backbutton").style.opacity=1;
        });
        player.on('ended', () => {
          parent.postMessage('nextepisode-pressed', '*');
        });

        var elem = document.getElementsByClassName("plyr__menu");
        var menu = document.querySelector('[role="menuitem"]:last-child');
        var mainmenu = document.querySelector("[id^='plyr-settings-'][id$='speed']");
        if (elem.length > 0) elem[0].insertAdjacentHTML("beforebegin", `
        <button type="button" class="plyr__control plyr__control--pressed" id="nextepisode" onclick="parent.postMessage('nextepisode-pressed', '*')">
          <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" fill="currentColor" class="bi bi-skip-end-fill" viewBox="3 2.5 11 11">
            <path d="M12.5 4a.5.5 0 0 0-1 0v3.248L5.233 3.612C4.693 3.3 4 3.678 4 4.308v7.384c0 .63.692 1.01 1.233.697L11.5 8.753V12a.5.5 0 0 0 1 0V4z"/>
          </svg>
          <span class="plyr__sr-only">Skip Episode</span>
        </button>
        `);
        if(mainmenu) mainmenu.insertAdjacentHTML("afterend", `
        <div id="server-settings" hidden>
          <button type="button" class="plyr__control plyr__control--back" onclick="document.getElementById('server-settings').setAttribute(\`hidden\`, true); document.querySelector(\`[id^='plyr-settings-'][id$='home']\`).removeAttribute('hidden');">

          </button>
          <div role="menu">

                <span class="plyr__menu__value">

                  <span class="plyr__badge">SD</span>

              </span>

        `);

        if (menu) menu.insertAdjacentHTML("afterend", `
          <button data-plyr="settings" type="button" onclick="document.getElementById('server-settings').removeAttribute('hidden'); document.querySelector(\`[id^='plyr-settings-'][id$='home']\`).setAttribute(\`hidden\`, true);" class="plyr__control plyr__control--forward" role="menuitem"aria-haspopup="true">
            <span>
              Server Selection
              <span class="plyr__menu__value">Default</span>
            </span>
          </button>
        `);

        if (menu && !navigator.userAgentData?.mobile) menu.insertAdjacentHTML("afterend", `
          <button data-plyr="settings" type="button" onclick="document.getElementById('submitmenu').style.display = 'block';" class="plyr__control plyr__control--forward" role="menuitem"aria-haspopup="true">
            <span>
              Timestamps Menu
              <span class="plyr__menu__value">Select</span>
            </span>
          </button>
        `);

        var eventListener = player.eventListeners.find(eventListener => eventListener.type === 'dblclick');
        eventListener.element.removeEventListener(eventListener.type, eventListener.callback, eventListener.options);
        
        if (navigator.userAgentData?.mobile) {
          const video = document.getElementsByClassName("plyr--full-ui")[0];
          const notifications = document.querySelectorAll('.notification');
          const forwardNotificationValue = document.querySelector('.video-forward-notify span');
          const rewindNotificationValue = document.querySelector('.video-rewind-notify span');

          let timer;
          let rewindSpeed = 0;
          let forwardSpeed = 0;

          function updateCurrentTime(delta) {
            let isRewinding = delta < 0;

            if (isRewinding) {
              rewindSpeed = rewindSpeed + delta;
              forwardSpeed = 0;
            } else {
              forwardSpeed = forwardSpeed + delta;
              rewindSpeed = 0;
            }

            clearTimeout(timer);

            let speed = (isRewinding ? rewindSpeed : forwardSpeed);
            player.currentTime = player.currentTime + speed;
            let NotificationValue = isRewinding ? rewindNotificationValue : forwardNotificationValue;
            NotificationValue.innerHTML = `${Math.abs(speed)} seconds`;

            timer = setTimeout(function () {
              rewindSpeed = 0;
              forwardSpeed = 0;
            }, 2000);
          }


          function animateNotificationIn(isRewinding) {
            isRewinding ? notifications[0].classList.add('animate-in') : notifications[1].classList.add('animate-in');
          }

          function animateNotificationOut() {
            this.classList.remove('animate-in');
          }

          function forwardVideo() {
            updateCurrentTime(10);
            animateNotificationIn(false);
          }

          function rewindVideo() {
            updateCurrentTime(-10);
            animateNotificationIn(true);
          }

          function doubleClickHandler(e) {
            const videoWidth = video.offsetWidth;
            (e.offsetX < videoWidth / 2) ? rewindVideo() : forwardVideo();
          }

          video.addEventListener('dblclick', doubleClickHandler);
          notifications.forEach(function (notification) {
            notification.addEventListener('animationend', animateNotificationOut);
          });
        }

        function keyHandler(event) {
          var key = event.code;
          if (key === "Space") {
            event.preventDefault();
            player.paused ? player.play() : player.pause();
          } else if(key === "KeyY" && !navigator.userAgentData?.mobile) {
              var visible = window.getComputedStyle(document.getElementById("submitmenu"), null).getPropertyValue("display");
              if(visible === "none") {
                document.getElementById("submitmenu").style.display = "block"
              } else {
                document.getElementById("submitmenu").style.display = "none"
              }
          } else if(key === "Escape") {
            document.getElementById("submitmenu").style.display = "none"
          }
        }
        window.addEventListener('keydown', keyHandler);
      });

      function skipIntro() {
        var player = document.getElementById("player").plyr;
        player.currentTime = Number('222');
        clearInterval(interval);
        var skipbutton = document.getElementById("skipbutton");
        skipbutton.style.display = "none";
      }
    </script>

        var query = {

          id: "137822",
          number: Number("3") || 0,

        });
      }

      function setFocus(type) {
        prevFocus = type;
      };

      function setCurrentTime() {
        var player = document.getElementById("player").plyr;
        if(!prevFocus) {
          document.getElementById("introstart").focus();
          prevFocus = "introstart";
        }
        var formatted = new Date(player.currentTime * 1000).toISOString().slice(14, 19);
        if(formatted) document.getElementById(prevFocus).value = formatted;
      }

      function submitStamp() {
        document.getElementById("submitmenu").style.display = "none";
        var player = document.getElementById("player").plyr;
        var introstart = Number(document.getElementById("introstart").value.split(":")[0])*60+Number(document.getElementById("introstart").value.split(":")[1]);
        var introend = Number(document.getElementById("introend").value.split(":")[0])*60+Number(document.getElementById("introend").value.split(":")[1]);
        if(introend < introstart || introend-introstart > 300 || isNaN(introstart) || isNaN(introend)) return parent.postMessage("invalid-timestamp", "*");
        var query = {
          timestamp: [introstart, introend],
          number: Number("3"),
          duration: player.duration,
          id: "137822"
        };
        parent.postMessage("show-submitted", "*");
        axios.post("https://api.animeflix.live/anime/timestamp/submit", {
          data: JSON.stringify(query),
        });
      }
    </script>
