services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=animeflix
      - POSTGRES_PASSWORD=animeflix
      - POSTGRES_DB=animeflix
    ports:
      # host 5433 to avoid clashing with a local Postgres on 5432
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U animeflix"]
      interval: 10s
      timeout: 3s
      retries: 5

  consumet:
    build: ./services/consumet
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - CONSUMET_PROVIDERS=${CONSUMET_PROVIDERS:-AnimeUnity,AnimeSaturn}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 15s
      timeout: 3s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://animeflix:animeflix@postgres:5432/animeflix
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-dev-secret-change-me}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-http://localhost:3000}
      - CONSUMET_PROVIDERS=${CONSUMET_PROVIDERS:-AnimeUnity,AnimeSaturn}
      - CONSUMET_API_URL=http://consumet:4000
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      consumet:
        condition: service_healthy

volumes:
  redis-data:
  postgres-data:
